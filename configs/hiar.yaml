# HiAR: Hierarchical Denoising for Autoregressive Long Video Generation
# Main training configuration

# Generator checkpoint (ODE-initialized)
generator_ckpt: ckpts/init.pt

# FSDP wrap strategy
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
real_name: Wan2.1-T2V-14B
text_encoder_fsdp_wrap_strategy: size

# 4-step denoising schedule
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true

# DMD training parameters
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow

# Mixed precision
mixed_precision: true
seed: 0

# WandB (optional, set via environment or override here)
wandb_host: WANDB_HOST
wandb_key: WANDB_KEY
wandb_entity: WANDB_ENTITY
wandb_project: WANDB_PROJECT

# Distributed training
sharding_strategy: hybrid_full

# Optimizer
lr: 2.0e-06
lr_critic: 3.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999

# Data
data_path: data/vidprom_filtered_extended.txt
batch_size: 1
ema_weight: 0.99
ema_start_step: 200
total_batch_size: 64
log_iters: 100

# Negative prompt (Chinese, for Wan model CFG)
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'

# Critic update ratio
dfake_gen_update_ratio: 5

# Video shape [batch, frames, channels, height, width]
image_or_video_shape:
- 1
- 21
- 16
- 60
- 104

# ---- Core: Hierarchical Denoising with DMD ----
distribution_loss: timestep_forcing_dmd
trainer: score_distillation

# Model
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0

# ---- Hierarchical Denoising Settings ----
# All blocks share the same denoising timestep (required for step-first order)
same_step_across_blocks: true
last_step_only: false
# Number of frames for gradient computation
num_training_frames: 21
# Extended rollout length (gradients only on last num_training_frames frames)
num_rollout_frames: 21
# Use stochastic (SDE) trajectory for stepping
use_ode_trajectory: false
# Use noisy context at intermediate steps (core to hierarchical denoising)
always_clean_context: false

# ---- Forward-KL Regularization ----
# Prevents low-motion shortcuts in DMD training.
# Applied to the first pd_num_steps denoising steps in bidirectional attention mode.
pd_enabled: true
# Number of steps for forward-KL (from step 0)
pd_num_steps: 1
# Forward-KL loss weight
pd_loss_weight: 0.1
# Path to pre-generated ODE trajectory pairs
pd_data_path: data/ode_pairs
# Loss type: "x0" (x0 prediction regression)
pd_loss_type: x0
# Target mode: "pred_x0" (extrapolated from teacher save points)
pd_x0_target_mode: pred_x0
# Compute mode: "single_forward" (full-sequence blockwise causal attention)
pd_compute_mode: single_forward

# ---- Teacher ODE Trajectory Settings ----
# Must match the parameters used in scripts/generate_ode_pairs.py
pd_teacher_timestep_shift: 8.0
pd_teacher_num_inference_steps: 48
pd_teacher_save_indices:
- 0
- 12
- 24
- 36
- -1

min_exit_step: 0
