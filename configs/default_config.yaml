# Default configuration for HiAR training.
# These values are merged with experiment-specific configs.

independent_first_frame: false
warp_denoising_step: false
weight_decay: 0.01
gradient_accumulation_steps: 0  # 0 means auto-calculate from total_batch_size
same_step_across_blocks: true
discriminator_lr_multiplier: 1.0
last_step_only: false
i2v: false
num_training_frames: 21
num_rollout_frames: 0  # 0 means equal to num_training_frames
gc_interval: 100
context_noise: 0
causal: true
denoising_order: timestep_first

ckpt_step: 0
height: 480
width: 832
num_frames: 81
